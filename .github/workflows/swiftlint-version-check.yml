name: SwiftLint Version Check

on:
  schedule:
    - cron: "0 1 * * 1"  # 每週一 09:00 Asia/Taipei (= 01:00 UTC)
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check:
    runs-on: macos-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v6

      - name: Detect version drift
        id: diff
        run: |
          set -euo pipefail
          upstream=$(gh release view --repo realm/SwiftLint --json tagName --jq .tagName)
          current=$(grep -oE 'SwiftLint/releases/download/[0-9]+\.[0-9]+\.[0-9]+' Package.swift | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          echo "upstream=$upstream" >> "$GITHUB_OUTPUT"
          echo "current=$current" >> "$GITHUB_OUTPUT"
          if [ "$upstream" = "$current" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Already up to date ($current)."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Update available: $current to $upstream"
          fi

      - name: Check existing PR
        if: steps.diff.outputs.changed == 'true'
        id: existing
        run: |
          set -euo pipefail
          branch="deps/swiftlint-${{ steps.diff.outputs.upstream }}"
          count=$(gh pr list --head "$branch" --state open --json number --jq 'length')
          if [ "$count" -gt 0 ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "PR for $branch already open, skip."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download artifact and compute checksum
        if: steps.diff.outputs.changed == 'true' && steps.existing.outputs.exists == 'false'
        id: artifact
        run: |
          set -euo pipefail
          new="${{ steps.diff.outputs.upstream }}"
          url="https://github.com/realm/SwiftLint/releases/download/${new}/SwiftLintBinary.artifactbundle.zip"
          curl -fsSL -o /tmp/SwiftLintBinary.artifactbundle.zip "$url"
          checksum=$(swift package compute-checksum /tmp/SwiftLintBinary.artifactbundle.zip)
          echo "checksum=$checksum" >> "$GITHUB_OUTPUT"
          echo "New checksum: $checksum"

      - name: Update Package.swift
        if: steps.diff.outputs.changed == 'true' && steps.existing.outputs.exists == 'false'
        run: |
          set -euo pipefail
          new="${{ steps.diff.outputs.upstream }}"
          old="${{ steps.diff.outputs.current }}"
          checksum="${{ steps.artifact.outputs.checksum }}"
          # 只改 SwiftLint 區塊：以 artifactbundle url 鎖定其 checksum 行、取舊值後「按值」替換，
          # 避免誤觸同檔的 SwiftFormat checksum（舊寫法 checksum:"[a-f0-9]+" 會把兩條都換成同一值）
          old_checksum=$(grep -A1 'SwiftLintBinary.artifactbundle.zip' Package.swift | grep -oE '[a-f0-9]{64}' | head -1)
          [ -n "${old_checksum}" ] || { echo "::error::找不到 SwiftLint checksum"; exit 1; }
          sed -i.bak "s|/releases/download/${old}/|/releases/download/${new}/|" Package.swift
          sed -i.bak "s|${old_checksum}|${checksum}|" Package.swift
          rm Package.swift.bak
          if ! grep -q "${new}" Package.swift; then
            echo "::error::sed did not apply, Package.swift unchanged"
            exit 1
          fi

      - name: Create PR
        if: steps.diff.outputs.changed == 'true' && steps.existing.outputs.exists == 'false'
        run: |
          set -euo pipefail
          new="${{ steps.diff.outputs.upstream }}"
          old="${{ steps.diff.outputs.current }}"
          branch="deps/swiftlint-${new}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add Package.swift
          git commit -m "build(deps): bump SwiftLint from ${old} to ${new}"
          git push -u origin "$branch"
          cat > /tmp/pr-body.md <<EOF
          Auto-generated by SwiftLint Version Check workflow.

          - upstream tag: \`${new}\`
          - source: <https://github.com/realm/SwiftLint/releases/tag/${new}>
          EOF
          gh pr create \
            --title "build(deps): bump SwiftLint from ${old} to ${new}" \
            --body-file /tmp/pr-body.md \
            --label dependencies \
            --label ci
