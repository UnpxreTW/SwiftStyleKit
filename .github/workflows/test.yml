name: Test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Pin Xcode 26.3
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.3'

      - name: Install tuist via mise
        uses: jdx/mise-action@v2

      - name: Probe toolchain
        run: |
          ls /Applications | grep -i Xcode || true
          xcodebuild -version
          swift --version
          tuist version

      - name: Build
        run: swift build

      # `swift test` 暫時拿掉：目前無 testTarget（commit 2bbb6a8 移除空 target、
      # 等 Step 2 接 FormatRule 時重建）。CI Swift 6.1.2 對無 test target exit 1
      # （本機 6.3 exit 0）、不能用。Step 2 重建 testTarget 後加回。

      - name: Lint Sources/ and Plugins/
        run: .build/artifacts/swiftstylekit/SwiftLintBinary/SwiftLintBinary.artifactbundle/macos/swiftlint lint --strict --quiet Sources/ Plugins/
